<!DOCTYPE html>
<html lang="en">
<head>
</head>
<body>
    <div id="root"></div>
</body>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>


  <script type="text/babel">
    function App() {
      const [amount,setAmount] = React.useState(0);
      const [isFlipped,setIsFlipped] = React.useState(false);
      const onChange = (event) => {
        setAmount(event.target.value);
      }

      const reset = () => {
        setAmount(0);
      }

      const onFlip = () => {
        reset();
        setIsFlipped((prev) => !prev);
      }

      return (
      <div>
        <h1 className="hi">Super Converter</h1>

        <div>
            <label htmlFor="amount"> Minutes </label>
            <input value ={isFlipped ? Math.round(amount * 60) : amount} 
                id="minutes" placeholder="Minutes" type="number" 
                onChange={onChange} 
                disabled = {isFlipped }
                />
            <h4>You wnat to convert {amount}</h4>

        </div>

        <div>
            <label htmlFor="hours"> Hours </label>
            <input value={isFlipped ? amount : Math.round(amount / 60)} 
                   id="hours"
                   placeholder="Hours"
                   type="number"
                   disabled = {!isFlipped}                
                   onChange={onChange} 
                    />

        </div>
        <button onClick={reset}>Reset</button>
        <button onClick={onFlip}>Flip</button>
        

      </div>);
    }

    const root = document.getElementById('root');
    ReactDOM.render(<App />, root);
  </script>

</html>
